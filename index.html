<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Kitchen Food Sorting</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script>
        // --- GAME LOGIC COMPONENT ---
        AFRAME.registerComponent('game-manager', {
            init: function () {
                this.selectedFood = null;
                this.foods = [];
                this.plates = [];
                this.originalPositions = new Map(); // Store original positions
                
                // Store references and initial positions
                this.el.sceneEl.querySelectorAll('.food').forEach(el => {
                    this.foods.push(el);
                    // Save the starting position to a Map
                    const pos = el.getAttribute('position');
                    this.originalPositions.set(el, {x: pos.x, y: pos.y, z: pos.z});
                });
                
                this.el.sceneEl.querySelectorAll('.plate').forEach(el => this.plates.push(el));

                // Listen for food clicks
                this.foods.forEach(food => {
                    food.addEventListener('click', () => {
                        if (this.selectedFood) {
                            this.selectedFood.setAttribute('color', '#ecf0f1');
                        }
                        this.selectedFood = food;
                        this.selectedFood.setAttribute('color', '#f1c40f');
                    });
                });

                // Listen for plate clicks
                this.plates.forEach(plate => {
                    plate.addEventListener('click', () => {
                        if (this.selectedFood) {
                            const platePos = plate.getAttribute('position');
                            const offsetX = (Math.random() - 0.5) * 0.4;
                            const offsetZ = (Math.random() - 0.5) * 0.4;
                            
                            this.selectedFood.setAttribute('position', {
                                x: platePos.x + offsetX,
                                y: platePos.y + 0.1,
                                z: platePos.z + offsetZ
                            });
                            
                            this.selectedFood.setAttribute('color', '#ecf0f1');
                            this.selectedFood = null;
                        }
                    });
                });

                // Listen for Check Answers button
                const checkBtn = document.querySelector('#check-btn');
                checkBtn.addEventListener('click', () => {
                    let score = 0;
                    let errorMessages = [];
                    
                    this.foods.forEach(food => {
                        const foodPos = food.getAttribute('position');
                        const foodGroup = food.getAttribute('data-group');
                        const foodName = food.querySelector('a-text').getAttribute('value');
                        
                        let closestPlate = null;
                        let minDistance = Infinity;

                        this.plates.forEach(plate => {
                            const platePos = plate.getAttribute('position');
                            const dx = foodPos.x - platePos.x;
                            const dz = foodPos.z - platePos.z;
                            const distance = Math.sqrt(dx*dx + dz*dz);
                            
                            if (distance < minDistance) {
                                minDistance = distance;
                                closestPlate = plate;
                            }
                        });

                        if (minDistance < 0.8 && closestPlate.getAttribute('data-category') === foodGroup) {
                            food.setAttribute('color', '#2ecc71'); 
                            score++;
                        } else {
                            food.setAttribute('color', '#e74c3c'); 
                            errorMessages.push(`${foodName} belongs to ${foodGroup}`);
                        }
                    });

                    const scoreBoardMain = document.querySelector('#score-board-main');
                    const scoreBoardDetails = document.querySelector('#score-board-details');

                    if (score === this.foods.length) {
                        scoreBoardMain.setAttribute('value', 'PERFECT! All Sorted!');
                        scoreBoardMain.setAttribute('color', '#2ecc71');
                        scoreBoardDetails.setAttribute('value', '');
                    } else {
                        scoreBoardMain.setAttribute('value', `Score: ${score} / ${this.foods.length}\nRed items are wrong!`);
                        scoreBoardMain.setAttribute('color', '#e74c3c');
                        let feedbackText = 'Corrections:\n' + errorMessages.join('\n');
                        scoreBoardDetails.setAttribute('value', feedbackText);
                    }
                });

                // RESET LOGIC
                const resetBtn = document.querySelector('#reset-btn');
                resetBtn.addEventListener('click', () => {
                    // 1. Move foods back to original positions and reset color
                    this.foods.forEach(food => {
                        const originalPos = this.originalPositions.get(food);
                        food.setAttribute('position', originalPos);
                        food.setAttribute('color', '#ecf0f1');
                    });

                    // 2. Clear Scoreboards
                    document.querySelector('#score-board-main').setAttribute('value', 'Sort the foods!');
                    document.querySelector('#score-board-main').setAttribute('color', '#2c3e50');
                    document.querySelector('#score-board-details').setAttribute('value', '');
                    
                    // 3. Clear selection
                    this.selectedFood = null;
                });
            }
        });
    </script>
</head>
<body>
    <a-scene game-manager cursor="rayOrigin: mouse">
        <a-sky color="#87CEEB"></a-sky>
        
        <a-plane rotation="-90 0 0" width="20" height="20" color="#95a5a6"></a-plane>
        
        <a-box position="0 0.8 -2.5" width="7" height="0.1" depth="2.5" color="#8b5a2b" shadow></a-box>
        <a-box position="-3.3 0.4 -1.4" width="0.15" height="0.8" depth="0.15" color="#5c3a21"></a-box>
        <a-box position="3.3 0.4 -1.4" width="0.15" height="0.8" depth="0.15" color="#5c3a21"></a-box>
        <a-box position="-3.3 0.4 -3.6" width="0.15" height="0.8" depth="0.15" color="#5c3a21"></a-box>
        <a-box position="3.3 0.4 -3.6" width="0.15" height="0.8" depth="0.15" color="#5c3a21"></a-box>

        <a-box position="0 0.7 -0.5" width="3.5" height="0.1" depth="1.5" color="#e67e22" shadow></a-box>
        <a-box position="-1.6 0.35 -0.1" width="0.1" height="0.7" depth="0.1" color="#d35400"></a-box>
        <a-box position="1.6 0.35 -0.1" width="0.1" height="0.7" depth="0.1" color="#d35400"></a-box>
        <a-box position="-1.6 0.35 -0.9" width="0.1" height="0.7" depth="0.1" color="#d35400"></a-box>
        <a-box position="1.6 0.35 -0.9" width="0.1" height="0.7" depth="0.1" color="#d35400"></a-box>

        <a-text position="0 4.6 -3.5" value="Welcome. Please identify which food group each of the following foods belongs to." align="center" width="7" color="#2c3e50"></a-text>
        <a-text position="0 3.8 -3.5" value="1. Click a food item to pick it up (Yellow).\n2. Click a plate to drop it.\n3. Click CHECK ANSWERS or RESET." align="center" width="5" color="#34495e"></a-text>

        <a-entity id="rig" position="0 0 1.5">
            <a-camera position="0 1.6 0"></a-camera>
            <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
            <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>
        </a-entity>

        <a-cylinder class="clickable plate" data-category="Sweets" position="-2 0.85 -3.2" radius="0.5" height="0.05" color="#ecf0f1">
            <a-text value="Sweets" align="center" position="0 0.2 -0.5" rotation="0 0 0" color="#2980b9" scale="0.8 0.8 0.8"></a-text>
        </a-cylinder>
        <a-cylinder class="clickable plate" data-category="Vegetables" position="0 0.85 -3.2" radius="0.5" height="0.05" color="#ecf0f1">
            <a-text value="Vegetables" align="center" position="0 0.2 -0.5" rotation="0 0 0" color="#2980b9" scale="0.8 0.8 0.8"></a-text>
        </a-cylinder>
        <a-cylinder class="clickable plate" data-category="Fats" position="2 0.85 -3.2" radius="0.5" height="0.05" color="#ecf0f1">
            <a-text value="Fats" align="center" position="0 0.2 -0.5" rotation="0 0 0" color="#2980b9" scale="0.8 0.8 0.8"></a-text>
        </a-cylinder>
        <a-cylinder class="clickable plate" data-category="Dairy" position="-2 0.85 -1.8" radius="0.5" height="0.05" color="#ecf0f1">
            <a-text value="Dairy" align="center" position="0 0.1 -0.5" rotation="0 0 0" color="#2980b9" scale="0.8 0.8 0.8"></a-text>
        </a-cylinder>
        <a-cylinder class="clickable plate" data-category="Carbs" position="0 0.85 -1.8" radius="0.5" height="0.05" color="#ecf0f1">
            <a-text value="Carbs" align="center" position="0 0.1 -0.5" rotation="0 0 0" color="#2980b9" scale="0.8 0.8 0.8"></a-text>
        </a-cylinder>
        <a-cylinder class="clickable plate" data-category="Proteins" position="2 0.85 -1.8" radius="0.5" height="0.05" color="#ecf0f1">
            <a-text value="Proteins" align="center" position="0 0.1 -0.5" rotation="0 0 0" color="#2980b9" scale="0.8 0.8 0.8"></a-text>
        </a-cylinder>

        <a-box class="clickable food" data-group="Sweets" position="-1.2 0.8 -0.2" width="0.3" height="0.1" depth="0.3" color="#ecf0f1"><a-text value="Soda" align="center" position="0 0.1 0" rotation="0 0 0" color="#000" width="1"></a-text></a-box>
        <a-box class="clickable food" data-group="Vegetables" position="-0.6 0.8 -0.2" width="0.3" height="0.1" depth="0.3" color="#ecf0f1"><a-text value="Spinach" align="center" position="0 0.1 0" rotation="0 0 0" color="#000" width="1"></a-text></a-box>
        <a-box class="clickable food" data-group="Fats" position="0 0.8 -0.2" width="0.3" height="0.1" depth="0.3" color="#ecf0f1"><a-text value="Fat Cake" align="center" position="0 0.1 0" rotation="0 0 0" color="#000" width="1"></a-text></a-box>
        <a-box class="clickable food" data-group="Dairy" position="0.6 0.8 -0.2" width="0.3" height="0.1" depth="0.3" color="#ecf0f1"><a-text value="Yoghurt" align="center" position="0 0.1 0" rotation="0 0 0" color="#000" width="1"></a-text></a-box>
        <a-box class="clickable food" data-group="Carbs" position="1.2 0.8 -0.2" width="0.3" height="0.1" depth="0.3" color="#ecf0f1"><a-text value="Kota" align="center" position="0 0.1 0" rotation="0 0 0" color="#000" width="1"></a-text></a-box>
        <a-box class="clickable food" data-group="Proteins" position="-1.2 0.8 -0.8" width="0.3" height="0.1" depth="0.3" color="#ecf0f1"><a-text value="Beans" align="center" position="0 0.1 0" rotation="0 0 0" color="#000" width="1"></a-text></a-box>
        <a-box class="clickable food" data-group="Proteins" position="-0.6 0.8 -0.8" width="0.3" height="0.1" depth="0.3" color="#ecf0f1"><a-text value="Snoek" align="center" position="0 0.1 0" rotation="0 0 0" color="#000" width="1"></a-text></a-box>
        <a-box class="clickable food" data-group="Proteins" position="0 0.8 -0.8" width="0.3" height="0.1" depth="0.3" color="#ecf0f1"><a-text value="Chicken" align="center" position="0 0.1 0" rotation="0 0 0" color="#000" width="1"></a-text></a-box>
        <a-box class="clickable food" data-group="Fats" position="0.6 0.8 -0.8" width="0.3" height="0.1" depth="0.3" color="#ecf0f1"><a-text value="Avocado" align="center" position="0 0.1 0" rotation="0 0 0" color="#000" width="1"></a-text></a-box>
        <a-box class="clickable food" data-group="Carbs" position="1.2 0.8 -0.8" width="0.3" height="0.1" depth="0.3" color="#ecf0f1"><a-text value="Mageu" align="center" position="0 0.1 0" rotation="0 0 0" color="#000" width="1"></a-text></a-box>

        <a-box id="check-btn" class="clickable" position="3 1.8 -2" width="1.5" height="0.5" depth="0.1" color="#27ae60">
            <a-text value="CHECK\nANSWERS" align="center" position="0 0 0.06" color="#FFF"></a-text>
        </a-box>

        <a-box id="reset-btn" class="clickable" position="3 1.2 -2" width="1.5" height="0.5" depth="0.1" color="#e67e22">
            <a-text value="RESET\nBOARD" align="center" position="0 0 0.06" color="#FFF"></a-text>
        </a-box>
        
        <a-text id="score-board-main" position="0 2.8 -2.5" value="Sort the foods!" align="center" color="#2c3e50" width="5"></a-text>
        <a-text id="score-board-details" position="0 2.5 -2.5" value="" align="center" baseline="top" color="#e74c3c" width="2.5"></a-text>

        <a-light type="ambient" color="#fff" intensity="0.7"></a-light>
        <a-light type="directional" position="2 5 3" intensity="0.5" castShadow="true"></a-light>
    </a-scene>
</body>
</html>
